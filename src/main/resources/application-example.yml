# 应用配置模板
# 复制本文件为 application.yml，填入你自己的真实配置
# cp application-example.yml application.yml

spring:
  application:
    name: CarbonPulse
  datasource:
    url: jdbc:mysql://localhost:3306/carbonpulse?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: your_db_username
    password: your_db_password
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

mybatis-plus:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.carbonpulse.system.**.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: your_jwt_secret_key_at_least_32_chars
  expiration: 604800000  # 7天

redisson:
  config: |
    singleServerConfig:
      address: "redis://localhost:6379"
      database: 0
      connectionPoolSize: 10
      connectionMinimumIdleSize: 5
